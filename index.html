<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kurakini - Pasta</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'EB Garamond', serif;
            background: #FAFAF7;
            color: #333;
            line-height: 1.4;
        }

        /* Головний контейнер - тепер він адаптивний */
        .card {
            background: #FAFAF7;
            width: 100%;
            max-width: 600px; /* Обмежуємо ширину на великих екранах */
            margin: 0 auto;
            overflow: hidden;
            border: 0.5px solid #E0D0C8;
        }

        .hero {
            background: #CC2020;
            padding: 20px 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap; /* Дозволяє логотипу переноситись на мобільних */
            text-align: center;
        }

        .hero-logo {
            height: 60px;
            object-fit: contain;
            background: #fff;
            border-radius: 10px;
            padding: 5px 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .hero-title span {
            display: block;
            font-size: 20px;
            font-weight: 600;
            color: #fff;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .hero-title small {
            display: block;
            font-size: 12px;
            color: #FFCCCC;
            margin-top: 4px;
        }

        .body {
            padding: 20px 15px;
        }

        .section-label {
            font-size: 13px;
            font-weight: 600;
            color: #CC2020;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        /* Сітка з товарами - автоматично стає в 1 колонку на вузьких екранах */
        .packs {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 18px;
        }

        .pack {
            background: #fff;
            border: 0.5px solid #E8D8C8;
            border-radius: 12px;
            padding: 15px 10px;
            text-align: center;
        }

        .pack-label { font-size: 12px; color: #8B5A2B; margin-bottom: 4px; }
        .pack-val { font-size: 18px; font-weight: 600; color: #7A1D1D; }
        .pack-sub { font-size: 11px; color: #B0B0B0; margin-top: 4px; }

        .pack.highlight { background: #CC2020; border-color: #CC2020; }
        .pack.highlight .pack-label { color: #FFCCCC; }
        .pack.highlight .pack-val { color: #fff; }
        .pack.highlight .pack-sub { color: #FFB0A0; }

        .divider { border: none; border-top: 0.5px solid #E8D8C8; margin: 15px 0; }

        .prod-img {
            width: 100%;
            height: auto;
            max-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #FDF8F2;
            border-radius: 8px;
            margin-bottom: 10px;
            overflow: hidden;
        }

        .prod-img img {
            max-width: 100%;
            height: auto;
        }

        /* Медіа-запити для зовсім маленьких екранів */
        @media (max-width: 400px) {
            .packs {
                grid-template-columns: 1fr; /* Повна ширина для карток на телефонах */
            }
            .hero-title span { font-size: 18px; }
        }
    </style>
</head>
<body>
    <div class="card">
        <header class="hero">
            <div class="hero-logo">LOGO</div>
            <div class="hero-title">
                <span>Kurakini — Strong Pasta</span>
                <small>100% DURUM WHEAT SEMOLINA</small>
            </div>
        </header>

        <div class="body">
            <div class="section-label">Наш асортимент</div>
            
            <div class="packs">
                <div class="pack">
                    <div class="pack-label">Penne</div>
                    <div class="prod-img">Картинка</div>
                    <div class="pack-val">400g</div>
                    <div class="pack-sub">Класичне пір'я</div>
                </div>
                <div class="pack highlight">
                    <div class="pack-label">Spirals</div>
                    <div class="prod-img">Картинка</div>
                    <div class="pack-val">500g</div>
                    <div class="pack-sub">Популярний вибір</div>
                </div>
                <div class="pack">
                    <div class="pack-label">Elbows</div>
                    <div class="prod-img">Картинка</div>
                    <div class="pack-val">1kg</div>
                    <div class="pack-sub">Сімейний формат</div>
                </div>
            </div>

            <hr class="divider">
            <p style="text-align: center; font-size: 14px;">Найкраща паста для вашої родини</p>
        </div>
    </div>
</body>
</html>
